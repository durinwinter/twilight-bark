syntax = "proto3";

package twilight;

message AgentIdentity {
  // Machine identity
  string agent_uuid = 1;
  string instance_uuid = 2;
  string node_uuid = 3;

  // Human identity
  string agent_name = 10;
  string display_name = 11;
  string role = 12;
  string role_description = 13;

  // Runtime context
  NodeKind node_kind = 20;
  string tenant = 21;
  string site = 22;
  string region = 23;

  // Model identity
  string llm_provider = 30;
  string llm_service = 31;
  string model_name = 32;
  string model_uuid = 33;

  // Capabilities
  repeated string roles = 40;
  repeated string scopes = 41;
  repeated string capabilities = 42;
  repeated string allowed_tools = 43;
  repeated string requires_approval_for = 44;

  // Security
  string public_key = 50;
  string auth_provider = 51;

  // Versioning
  string agent_version = 60;
  string runtime = 61;
  string host = 62;
  string node_id = 63;  // "{hostname}-{username}" — fabric-wide unique node identifier
}

enum NodeKind {
  NODE_KIND_UNSPECIFIED = 0;
  NODE_KIND_AGENT = 1;
  NODE_KIND_ADAPTER = 2;
  NODE_KIND_CONTROLLER = 3;
  NODE_KIND_HUMAN = 4;
}

message AgentPresence {
  AgentIdentity identity = 1;
  AgentStatus status = 2;

  repeated string subscribes_to = 3;
  repeated string publishes_to = 4;

  int64 started_unix_ms = 5;
  int64 last_seen_unix_ms = 6;
  int64 ttl_ms = 7;
}

enum AgentStatus {
  AGENT_STATUS_UNSPECIFIED = 0;
  AGENT_STATUS_ONLINE = 1;
  AGENT_STATUS_BUSY = 2;
  AGENT_STATUS_IDLE = 3;
  AGENT_STATUS_OFFLINE = 4;
  AGENT_STATUS_ERROR = 5;
}

message Heartbeat {
  string node_id = 1;
  AgentStatus status = 2;
  int64 timestamp_unix_ms = 3;
  uint32 active_tasks = 4;
  uint32 queued_tasks = 5;
}

message MessageTarget {
  TargetKind target_kind = 1;

  repeated string target_agent_uuids = 2;
  repeated string target_agent_names = 3;

  repeated string target_roles = 4;
  repeated string target_capabilities = 5;

  bool allow_traffic_controller_routing = 6;
  bool require_all_targets = 7;
  uint32 max_recipients = 8;
}

enum TargetKind {
  TARGET_KIND_UNSPECIFIED = 0;
  TARGET_KIND_UNICAST = 1;
  TARGET_KIND_MULTICAST = 2;
  TARGET_KIND_BROADCAST = 3;
  TARGET_KIND_ROLE = 4;
  TARGET_KIND_CAPABILITY = 5;
}

message TwilightEnvelope {
  string message_uuid = 1;
  string correlation_uuid = 2;
  string causation_uuid = 3;

  AgentIdentity source = 4;
  MessageTarget target = 5;

  MessageKind kind = 6;
  Priority priority = 7;

  int64 created_unix_ms = 8;
  int64 expires_unix_ms = 9;

  repeated string tags = 10;

  oneof payload {
    TaskRequest task_request = 20;
    TaskResult task_result = 21;
    Observation observation = 22;
    ArtifactNotice artifact_notice = 23;
    ErrorReport error_report = 24;
    RouteDecision route_decision = 25;
    ApprovalRequest approval_request = 26;
    ManagementCommand management_command = 27;
    ManagementResult management_result = 28;
  }
}

enum MessageKind {
  MESSAGE_KIND_UNSPECIFIED = 0;
  MESSAGE_KIND_TASK_REQUEST = 1;
  MESSAGE_KIND_TASK_RESULT = 2;
  MESSAGE_KIND_OBSERVATION = 3;
  MESSAGE_KIND_ARTIFACT_NOTICE = 4;
  MESSAGE_KIND_ERROR_REPORT = 5;
  MESSAGE_KIND_ROUTE_DECISION = 6;
  MESSAGE_KIND_APPROVAL_REQUEST = 7;
  MESSAGE_KIND_MANAGEMENT_COMMAND = 8;
  MESSAGE_KIND_MANAGEMENT_RESULT = 9;
}

enum Priority {
  PRIORITY_UNSPECIFIED = 0;
  PRIORITY_LOW = 1;
  PRIORITY_NORMAL = 2;
  PRIORITY_HIGH = 3;
  PRIORITY_CRITICAL = 4;
}

// Payloads
message TaskRequest {
  string task_id = 1;
  string operation = 2;
  string input_json = 3;
  int64 timeout_ms = 4;
}

message TaskResult {
  string task_id = 1;
  string output_json = 2;
  bool success = 3;
  string error_message = 4;
}

message Observation {
  string source_id = 1;
  string event_type = 2;
  string data_json = 3;
}

message ArtifactNotice {
  string artifact_id = 1;
  string artifact_path = 2;
  string mime_type = 3;
  int64 size_bytes = 4;
}

message ErrorReport {
  string error_code = 1;
  string message = 2;
  string details_json = 3;
}

message RouteDecision {
  string task_id = 1;
  repeated string selected_agents = 2;
}

message ApprovalRequest {
  string approval_id = 1;
  string action = 2;
  string description = 3;
  string context_json = 4;
}

message ManagementCommand {
  string command = 1;
  string arguments_json = 2;
}

message ManagementResult {
  string result_json = 1;
  bool success = 2;
}
